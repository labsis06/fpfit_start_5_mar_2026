<VirtualHost *:80>
    ServerName tapeserver2.int.ov.ingv.it

    ProxyPreserveHost On
    ProxyRequests Off

    <Location />
        AuthType Basic
        AuthName "FPFIT"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user

        ProxyPass http://127.0.0.1:8001/
        ProxyPassReverse http://127.0.0.1:8001/
    </Location>

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/fpfitweb_error.log
    CustomLog ${APACHE_LOG_DIR}/fpfitweb_access.log combined
</VirtualHost>
